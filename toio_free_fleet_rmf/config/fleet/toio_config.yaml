# FLEET CONFIG =================================================================
# Mirrors free_fleet_examples/config/fleet/nav2_unique_multi_tb3_simulation_fleet_config.yaml.
# Per-robot `navigation_stack: 2` selects upstream Nav2RobotAdapter, which is
# what the toio_free_fleet_client speaks (via the zenoh-bridge-ros2dds bridge).

rmf_fleet:
  name: "toio"
  limits:
    linear: [1.0, 2.0]    # velocity, acceleration (m/s, m/s^2)
    angular: [3.0, 5.0]   # velocity, acceleration (rad/s, rad/s^2)
  profile:
    footprint: 1.25       # radius in m (cube body 31.8 mm * 50 = 1.59 m; rounded down)
    vicinity:  2.50
  reversible: True
  battery_system:
    voltage: 3.7
    capacity: 0.26
    charging_current: 0.3
  mechanical_system:
    mass: 0.05
    moment_of_inertia: 0.00002
    friction_coefficient: 0.20
  ambient_system:
    power: 0.1
  tool_system:
    power: 0.0
  recharge_threshold: 0.10
  recharge_soc: 0.95
  publish_fleet_state: 2.0
  account_for_battery_drain: True
  task_capabilities:
    loop: True
    delivery: True
  finishing_request: "nothing"
  responsive_wait: True
  robots:
    cube_0:
      charger: "toio_0_charger"
      responsive_wait: False
      navigation_stack: 2
      init_timeout_sec: 10
      initial_map: "L1"
      map_frame: "map"
      robot_frame: "base_footprint"
      maps:
        L1:
          # TODO: replace with the nav2 map.yaml exported from traffic_editor
          # (see `building_map_generator nav` in the README).
          map_url: ""
    cube_1:
      charger: "toio_1_charger"
      responsive_wait: False
      navigation_stack: 2
      init_timeout_sec: 10
      initial_map: "L1"
      map_frame: "map"
      robot_frame: "base_footprint"
      maps:
        L1:
          map_url: ""

  robot_state_update_frequency: 10.0


# TRANSFORM CONFIG =============================================================
# Keyed by *map level name* (matches `levels:` in toio_map.building.yaml). The 4
# points must be listed in matching order between `rmf` and `robot` — order
# below is top-left, top-right, bottom-left, bottom-right.
#
# `robot` is in the cube's RMF-meter frame (anchored at mat top-left = 0, 0).
# The client publishes TF in this frame already (mat_to_rmf_xy applied on the
# BLE side). These 4 corners describe the physical mat outline: 15.2 × 10.8 m.
#
# `rmf` corners are the same mat outline placed in traffic_editor on the
# toio_map background image. The image has a legend/margin outside the mat so
# the mat corners are inset from the image edges; that small offset is the
# only difference between the two coord systems and is what `nudged` learns.

reference_coordinates:
  L1:
    rmf: [[1.6866,  -1.6016],
          [16.6677, -1.6016],
          [1.6866, -12.043],
          [16.6677, -12.043]]
    robot: [[0.0,   0.0],
            [15.2,  0.0],
            [0.0,  -10.8],
            [15.2, -10.8]]
